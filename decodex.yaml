{
  "name": "Decodex",
  "version": "0.1.7",
  "status": "mvp",
  "runtime": {
    "python_candidates": [
      "python",
      "python3"
    ]
  },
  "hash_policy": {
    "algorithm": "sha256",
    "text_normalization": "lf-v1"
  },
  "layers": {
    "inbox": {
      "purpose": "raw session evidence"
    },
    "projects": {
      "purpose": "validated project-specific knowledge"
    },
    "global": {
      "purpose": "cross-project reusable knowledge"
    }
  },
  "registry": {
    "skills_index": "registry/skills-index.yaml",
    "projects_index": "registry/projects-index.yaml",
    "promotion_history": "registry/promotion-history.jsonl"
  },
  "conventions": {
    "knowledge_states": [
      "RAW",
      "OBSERVED",
      "CANDIDATE",
      "PROJECT_VALIDATED",
      "GLOBAL_VALIDATED",
      "DEPRECATED"
    ]
  }
}
